    function useInView(t = 0.05) {
      const r = useRef(null);
      const [v, s] = useState(false);
      useEffect(() => {
        const e = r.current;
        if (!e) return;
        const o = new IntersectionObserver(([en]) => {
          if (en.isIntersecting) {
            s(true);
            o.disconnect();
          }
        }, { threshold: t, rootMargin: "0px 0px 80px 0px" });
        o.observe(e);
        // Fallback: if element is already in viewport on load, show it
        const rect = e.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          s(true);
        }
        return () => o.disconnect();
      }, []);
      return [r, v];
    }

    function FadeIn({ children, delay = 0, y = 30, style = {} }) {
      const [r, v] = useInView();
      return (
        <div
          ref={r}
          style={{
            opacity: v ? 1 : 0,
            transform: v ? "translateY(0)" : `translateY(${y}px)`,
            transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
            ...style
          }}
        >
          {children}
        </div>
      );
    }

    function EmailForm({ variant = "default" }) {
      const [e, se] = useState("");
      const [sub, ss] = useState(false);
      const [sending, setSending] = useState(false);
      const [err, setErr] = useState("");
      const h = (ev) => {
        ev.preventDefault();
        if (!e || !e.includes("@")) return;
        setSending(true);
        setErr("");
        fetch("https://script.google.com/macros/s/AKfycbw2gvCLf51Nh1qyXsnqjNzlBc5UYbjI2oUYsEsCIj6-Oi3LE1p9MQJtcBOmXrYKjMQc/exec", {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: e })
        })
          .then(() => { ss(true); setSending(false); })
          .catch(() => { setErr("Something went wrong. Please try again."); setSending(false); });
      };
      if (sub)
        return (
          <div
            style={{
              padding: "16px 32px",
              borderRadius: 12,
              background: "rgba(52,211,153,0.08)",
              border: "1px solid rgba(52,211,153,0.2)",
              display: "inline-flex",
              alignItems: "center",
              gap: 10

                stroke="#fff"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
            <span
              style={{ color: "#34D399", fontSize: 14, fontWeight: 600 }}
            >
              You're on the list. We'll be in touch soon.
            </span>
          </div>
        );
      return (
        <form
          onSubmit={h}
          style={{
            display: "flex",
            gap: 8,
            maxWidth: 420,
            width: "100%",
            margin: variant === "center" ? "0 auto" : undefined
          }}
        >
          <input
            type="email"
            placeholder="your@email.com"
            value={e}
            onChange={(ev) => se(ev.target.value)}
            style={{
              flex: 1,
              padding: "14px 18px",
              borderRadius: 10,
              border: "1px solid var(--border)",
              background: "var(--card)",
              color: "var(--text)",
              fontSize: 14,
              fontFamily: "var(--f-body)",
              outline: "none"
            }}
            onFocus={(ev) =>
              (ev.target.style.borderColor = "rgba(91,140,90,0.4)")
            }
            onBlur={(ev) =>
              (ev.target.style.borderColor = "rgba(91,140,90,0.1)")
            }
          />
          <button
            type="submit"
            disabled={sending}
            style={{
              padding: "14px 28px",
              borderRadius: 10,
              border: "none",
              cursor: sending ? "wait" : "pointer",
              background: sending ? "#999" : "linear-gradient(135deg, #5B8C5A, #3A7A39)",
              color: "#fff",
              fontSize: 14,
              fontWeight: 700,
              fontFamily: "var(--f-body)",
              boxShadow: sending ? "none" : "0 4px 20px rgba(91,140,90,0.3)",
              whiteSpace: "nowrap",
              opacity: sending ? 0.7 : 1,
              transition: "all 0.3s ease"
            }}
          >
            {sending ? "Joining..." : "Join Waitlist"}
          </button>
          {err && <div style={{ color: "#ef4444", fontSize: 12, marginTop: 4 }}>{err}</div>}
        </form>
      );
    }
