// √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä Component √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä
function InteractiveWorldMap() {
  const [worldData, setWorldData] = useState(null);
  const [visited, setVisited] = useState(new Set());
  const [memories, setMemories] = useState({});
  const [hovered, setHovered] = useState(null);
  const [lastUnlocked, setLastUnlocked] = useState(null);
  const [showToast, setShowToast] = useState(false);
  const [showMemoryModal, setShowMemoryModal] = useState(null);
  const [memoryDraft, setMemoryDraft] = useState({ note: "", region: "", city: "", customLocation: "", month: "", year: "" });
  const [showShareCard, setShowShareCard] = useState(false);
  const [activeTab, setActiveTab] = useState("map");
  const [searchQuery, setSearchQuery] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [showSearch, setShowSearch] = useState(false);
  const [passportPage, setPassportPage] = useState(0); // which country in passport book view
  const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
  // Zoom/pan state
  const [transform, setTransform] = useState({ x: 0, y: 0, k: 1 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState(null);
  const mapRef = useRef(null);
  const svgRef = useRef(null);

  // Load world topojson
  useEffect(() => {
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r => r.json())
      .then(topology => {
        const countries = topology.objects.countries;
        const arcs = topology.arcs;
        const decodedArcs = arcs.map(arc => {
          let x = 0, y = 0;
          return arc.map(([dx, dy]) => {
            x += dx; y += dy;
            return [
              topology.transform.translate[0] + x * topology.transform.scale[0],
              topology.transform.translate[1] + y * topology.transform.scale[1]
            ];
          });
        });
        function arcToCoords(i) { return i >= 0 ? decodedArcs[i] : [...decodedArcs[~i]].reverse(); }
        function ringToCoords(ring) { let c = []; ring.forEach(i => { c = c.concat(arcToCoords(i)); }); return c; }
        const features = countries.geometries.map(geom => {
          let coordinates;
          if (geom.type === "Polygon") coordinates = geom.arcs.map(r => ringToCoords(r));
          else if (geom.type === "MultiPolygon") coordinates = geom.arcs.map(p => p.map(r => ringToCoords(r)));
          return { type: "Feature", id: geom.id, properties: { name: COUNTRY_DATA[geom.id]?.name || `${geom.id}` }, geometry: { type: geom.type, coordinates } };
        });
        setWorldData({ type: "FeatureCollection", features });
      });
  }, []);

  // Search
  useEffect(() => {
    if (!searchQuery.trim()) { setSearchResults([]); return; }
    const q = searchQuery.toLowerCase();
    const results = Object.entries(COUNTRY_DATA)
      .filter(([, c]) => c.name.toLowerCase().includes(q) || c.continent.toLowerCase().includes(q))
      .slice(0, 8)
      .map(([id, c]) => ({ id, ...c }));
    setSearchResults(results);
  }, [searchQuery]);

  // Zoom handlers
  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const rect = mapRef.current?.getBoundingClientRect();
    if (!rect) return;
    // Convert mouse position from screen pixels to viewBox coordinates
    const mx = (e.clientX - rect.left) / rect.width * width;
    const my = (e.clientY - rect.top) / rect.height * height;
    const delta = e.deltaY > 0 ? 0.85 : 1.18;
    setTransform(prev => {
      const nk = Math.max(1, Math.min(8, prev.k * delta));
      const ratio = nk / prev.k;
      return { k: nk, x: mx - ratio * (mx - prev.x), y: my - ratio * (my - prev.y) };
    });
  }, []);

  const handleMouseDown = useCallback((e) => {
    if (transform.k <= 1) return;
    const rect = mapRef.current?.getBoundingClientRect();
    if (!rect) return;
    // Store starting mouse position in viewBox coords
    const vx = (e.clientX - rect.left) / rect.width * width;
    const vy = (e.clientY - rect.top) / rect.height * height;
    setIsDragging(true);
    setDragStart({ x: vx - transform.x, y: vy - transform.y });
  }, [transform]);

  const handleMouseMove = useCallback((e) => {
    const rect = mapRef.current?.getBoundingClientRect();
    if (rect) setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
    if (!isDragging || !dragStart || !rect) return;
    const vx = (e.clientX - rect.left) / rect.width * width;
    const vy = (e.clientY - rect.top) / rect.height * height;
    setTransform(prev => ({ ...prev, x: vx - dragStart.x, y: vy - dragStart.y }));
  }, [isDragging, dragStart]);

  const handleMouseUp = useCallback(() => { setIsDragging(false); setDragStart(null); }, []);
  const resetZoom = () => setTransform({ x: 0, y: 0, k: 1 });

  const handleCountryClick = useCallback((id) => {
    if (isDragging) return;
    const info = COUNTRY_DATA[id];
    if (!info) return;
    setVisited(prev => {
      const next = new Set(prev);
      if (next.has(id)) { next.delete(id); setMemories(m => { const n = {...m}; delete n[id]; return n; }); }
      else {
        next.add(id);
        setLastUnlocked(id);
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3500);
        setTimeout(() => setShowMemoryModal(id), 600);
      }

            <div style={{ fontSize: 44, marginBottom: 6 }}>{conts.size >= 6 ? "√∞¬ü¬å¬ç" : conts.size >= 4 ? "√¢¬ú¬à√Ø¬∏¬è" : conts.size >= 2 ? "√∞¬ü¬ß¬≥" : "√∞¬ü¬ó¬∫√Ø¬∏¬è"}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: C.text, marginBottom: 4 }}>{title}</div>
            <div style={{ fontSize: 13, color: C.textSoft, marginBottom: 24 }}>
              {conts.size} continent{conts.size !== 1 ? "s" : ""} √Ç¬∑ {xp} XP √Ç¬∑ {((visited.size / 195) * 100).toFixed(1)}% of the world
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 28, flexWrap: "wrap" }}>
              {visitedArr.slice(0, 10).map(c => (
                <div key={c.id} style={{
                  width: 42, height: 42, borderRadius: 11, background: `${C.cont[c.continent]}10`,
                  border: `1.5px solid ${C.cont[c.continent]}25`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20,
                }}>{c.sticker.icon}</div>
              ))}
              {visitedArr.length > 10 && <div style={{ width: 42, height: 42, borderRadius: 11, background: C.bgDeep, border: `1.5px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: C.textSoft }}>+{visitedArr.length - 10}</div>}
            </div>
            <div onClick={() => setShowShareCard(false)} style={{ padding: "14px 28px", borderRadius: 14, background: C.accent, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", display: "inline-block" }}>
              Screenshot & Share √¢¬ú¬®
            </div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 12 }}>venture.app √¢¬Ä¬î coming soon</div>
          </div>
        </div>
      )}

      {/* √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä MAP TAB √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä */}
      {activeTab === "map" && (
        <div style={{ width: "100%", maxWidth: 960, padding: "20px 16px 0" }}>
          <div
            ref={mapRef}
            onWheel={handleWheel}
            onMouseDown={handleMouseDown}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}
            onMouseLeave={handleMouseUp}
            style={{
              position: "relative", width: "100%", background: C.ocean,
              borderRadius: 20, border: `1px solid ${C.border}`, overflow: "hidden",
              boxShadow: `0 4px 24px ${C.shadow}`, cursor: transform.k > 1 ? (isDragging ? "grabbing" : "grab") : "default",
            }}
          >
            {!worldData ? (
              <div style={{ height: 460, display: "flex", alignItems: "center", justifyContent: "center", color: C.textMuted }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 32, marginBottom: 8 }}>√∞¬ü¬å¬ç</div>
                  <div style={{ fontSize: 14 }}>Loading your world...</div>
                </div>
              </div>
            ) : (
              <svg ref={svgRef} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", display: "block" }}>
                <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`} style={{ transformOrigin: "0 0" }}>
                  <path d={pathGenerator(d3.geoGraticule10())} fill="none" stroke="rgba(107,127,191,0.06)" strokeWidth="0.5" />
                  <path d={pathGenerator({ type: "Sphere" })} fill="none" stroke="rgba(107,127,191,0.12)" strokeWidth="0.8" />
                  {worldData.features.map(feature => {
                    const id = feature.id;
                    const isV = visited.has(id);
                    const isH = hovered === id;
                    const info = COUNTRY_DATA[id];
                    const cont = info?.continent;
                    const color = cont ? C.cont[cont] : "#B0BCCA";
                    const d = pathGenerator(feature);
                    if (!d) return null;
                    return (
                      <path key={id} d={d}
                        fill={isV ? color : isH && info ? `${color}25` : isH ? `${C.landHover}` : C.land}
                        fillOpacity={isV ? 0.75 : 1}
                        stroke={isV ? color : isH ? "rgba(107,127,191,0.35)" : "rgba(255,255,255,0.6)"}
                        strokeWidth={(isV ? 1.2 : 0.4) / transform.k}
                        style={{ cursor: info ? "pointer" : "default", transition: "fill 0.2s ease, stroke 0.2s ease" }}
                        onClick={() => info && handleCountryClick(id)}
                        onMouseEnter={() => setHovered(id)}
                        onMouseLeave={() => setHovered(null)}
                      />
                    );
                  })}
                </g>
              </svg>
            )}

            {/* Zoom controls */}
            <div style={{ position: "absolute", bottom: 12, right: 12, display: "flex", gap: 4, zIndex: 10 }}>
              <button onClick={() => setTransform(p => {
                const nk = Math.min(8, p.k * 1.4);
                const cx = width / 2, cy = height / 2;
                const ratio = nk / p.k;
                return { k: nk, x: cx - ratio * (cx - p.x), y: cy - ratio * (cy - p.y) };
              })} style={zoomBtnStyle}>+</button>
              <button onClick={() => setTransform(p => {
                const nk = Math.max(1, p.k * 0.7);
                if (nk <= 1) return { x: 0, y: 0, k: 1 };
                const cx = width / 2, cy = height / 2;
                const ratio = nk / p.k;
                return { k: nk, x: cx - ratio * (cx - p.x), y: cy - ratio * (cy - p.y) };
              })} style={zoomBtnStyle}>√¢¬à¬í</button>
              {transform.k > 1 && <button onClick={resetZoom} style={{ ...zoomBtnStyle, fontSize: 10, width: "auto", padding: "0 10px" }}>Reset</button>}
            </div>

            {/* Zoom hint */}
            {transform.k <= 1 && visited.size === 0 && (
              <div style={{ position: "absolute", bottom: 12, left: 12, fontSize: 11, color: C.textMuted, background: `${C.card}cc`, padding: "6px 12px", borderRadius: 8, backdropFilter: "blur(4px)" }}>
                Scroll to zoom √Ç¬∑ Click countries to visit
              </div>
            )}

            {/* Tooltip with discovery prompt √¢¬Ä¬î positioned away from cursor to never block clicks */}
            {hovered && hoveredC && !isDragging && (
              <div style={{
                position: "absolute",
                left: mousePos.x > (mapRef.current?.offsetWidth || 800) / 2
                  ? Math.max(mousePos.x - 280, 8)
                  : Math.min(mousePos.x + 24, (mapRef.current?.offsetWidth || 800) - 270),
                top: mousePos.y > (mapRef.current?.offsetHeight || 460) / 2
                  ? Math.max(mousePos.y - 160, 8)
                  : mousePos.y + 24,
                background: C.card, borderRadius: 14, padding: "14px 18px",
                border: `1px solid ${C.cont[hoveredC.continent]}20`,
                pointerEvents: "none", zIndex: 20, maxWidth: 250,
                boxShadow: `0 8px 32px ${C.shadowDeep}`,
                userSelect: "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 24 }}>{hoveredC.sticker.icon}</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: C.text }}>{hoveredC.name}</div>
                    <div style={{ fontSize: 11, color: C.textSoft }}>
                      {visited.has(hovered) ? `√¢¬ú¬ì Visited √Ç¬∑ ${hoveredC.sticker.title}` : hoveredC.continent}
                    </div>
                  </div>
                </div>
                {!visited.has(hovered) && hoveredC.discover && (
                  <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.borderLight}`, fontSize: 12, color: C.textSoft, lineHeight: 1.5, fontStyle: "italic" }}>
                    √∞¬ü¬í¬° {hoveredC.discover}
                  </div>
                )}
                {visited.has(hovered) && (memories[hovered]?.note || memories[hovered]?.location) && (
                  <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.borderLight}`, fontSize: 12, color: C.textSoft, lineHeight: 1.5 }}>
                    {memories[hovered].location && <div>√∞¬ü¬ì¬ç {memories[hovered].location}{memories[hovered].date ? ` √Ç¬∑ ${memories[hovered].date}` : ""}</div>}
                    {memories[hovered].note && <div style={{ marginTop: memories[hovered].location ? 4 : 0 }}>√∞¬ü¬ì¬å "{memories[hovered].note}"</div>}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {/* √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä PASSPORT TAB (Book Style) √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä */}
      {activeTab === "passport" && (
        <div style={{ width: "100%", maxWidth: 700, padding: "20px 16px" }}>
          {visitedArr.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 20px", background: C.card, borderRadius: 24, border: `1px solid ${C.border}`, boxShadow: `0 4px 20px ${C.shadow}` }}>
              <div style={{ fontSize: 52, marginBottom: 14 }}>√∞¬ü¬ì¬î</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 6 }}>Your passport is empty</div>
              <div style={{ fontSize: 14, color: C.textSoft, lineHeight: 1.6 }}>
                Switch to the map and click countries you've visited<br/>to start filling your travel journal
              </div>
            </div>
          ) : (
            <div>
              {/* Page indicator */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <button disabled={passportPage <= 0} onClick={() => setPassportPage(p => p - 1)} style={{ ...navBtnStyle, opacity: passportPage <= 0 ? 0.3 : 1 }}>√¢¬Ü¬ê Prev</button>
                <span style={{ fontSize: 12, color: C.textMuted, fontWeight: 600 }}>Page {passportPage + 1} of {visitedArr.length}</span>
                <button disabled={passportPage >= visitedArr.length - 1} onClick={() => setPassportPage(p => p + 1)} style={{ ...navBtnStyle, opacity: passportPage >= visitedArr.length - 1 ? 0.3 : 1 }}>Next √¢¬Ü¬í</button>
              </div>

              {/* Passport page */}
              {(() => {
                const c = visitedArr[passportPage];
                if (!c) return null;
                const color = C.cont[c.continent];
                return (
                  <div style={{
                    background: C.card, borderRadius: 24, overflow: "hidden",
                    border: `1px solid ${C.border}`, boxShadow: `0 8px 32px ${C.shadow}`,
                  }}>
                    {/* Page header √¢¬Ä¬î stamp style */}
                    <div style={{
                      background: `linear-gradient(135deg, ${color}08, ${color}15)`,
                      borderBottom: `1px solid ${color}15`, padding: "32px 32px 28px",
                      display: "flex", alignItems: "center", gap: 20,
                    }}>
                      <div style={{
                        width: 80, height: 80, borderRadius: 22, background: `${color}12`,
                        border: `3px solid ${color}25`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 42,
                      }}>{c.sticker.icon}</div>
                      <div>
                        <div style={{ fontWeight: 800, fontSize: 24, color: C.text, lineHeight: 1.2 }}>{c.name}</div>
                        <div style={{ fontSize: 14, color, fontWeight: 700, marginTop: 2 }}>{c.sticker.title}</div>
                        <div style={{ fontSize: 13, color: C.textSoft, fontStyle: "italic", marginTop: 2 }}>{c.sticker.desc}</div>
                        <div style={{ fontSize: 11, color: C.textMuted, marginTop: 6 }}>
                          {c.continent}
                          {c.memory?.location ? ` √Ç¬∑ √∞¬ü¬ì¬ç ${c.memory.location}` : ""}
                          {c.memory?.date ? ` √Ç¬∑ ${c.memory.date}` : ""}
                        </div>
                      </div>
                    </div>

                    {/* Page body */}
                    <div style={{ padding: "28px 32px 32px" }}>
                      {c.memory?.note ? (
                        <div>
                          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, letterSpacing: "0.06em", marginBottom: 10 }}>YOUR MEMORY</div>
                          <div style={{
                            fontSize: 16, color: C.text, lineHeight: 1.7,
                            fontStyle: "italic", padding: "16px 20px",
                            background: C.bgDeep, borderRadius: 14,
                            borderLeft: `3px solid ${color}40`,
                          }}>
                            "{c.memory.note}"
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "20px 0" }}>
                          <div style={{ fontSize: 13, color: C.textSoft, marginBottom: 10 }}>No memory added yet</div>
                          <button onClick={() => { setMemoryDraft({ note: "", region: "", city: "", customLocation: "", month: "", year: "" }); setShowMemoryModal(c.id); }} style={{
                            padding: "10px 20px", borderRadius: 10, border: `1px solid ${C.accent}`,
                            background: "transparent", color: C.accent, fontWeight: 600, fontSize: 13, cursor: "pointer",
                          }}>+ Write a memory</button>
                        </div>
                      )}

                      {/* Photo placeholder */}
                      <div style={{
                        marginTop: 20, border: `2px dashed ${C.border}`, borderRadius: 14,
                        padding: "28px 20px", textAlign: "center", color: C.textMuted, fontSize: 13,
                        background: `${C.bgDeep}80`,
                      }}>
                        √∞¬ü¬ì¬∑ Your photo from {c.name}
                        <div style={{ fontSize: 11, marginTop: 4 }}>Photo uploads coming soon</div>
                      </div>

                      {/* Discovery fact */}
                      <div style={{
                        marginTop: 20, padding: "14px 18px", background: `${color}06`,
                        borderRadius: 12, border: `1px solid ${color}12`,
                      }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color, letterSpacing: "0.06em", marginBottom: 4 }}>DID YOU KNOW?</div>
                        <div style={{ fontSize: 13, color: C.textSoft, lineHeight: 1.5 }}>{c.discover}</div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Page dots */}
              <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 16, flexWrap: "wrap" }}>
                {visitedArr.map((c, i) => (
                  <div key={c.id} onClick={() => setPassportPage(i)} style={{
                    width: passportPage === i ? 28 : 8, height: 8, borderRadius: 4,
                    background: passportPage === i ? C.accent : C.border,
                    cursor: "pointer", transition: "all 0.2s ease",
                  }} />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä Bottom Actions √¢¬î¬Ä√¢¬î¬Ä√¢¬î¬Ä */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center", padding: "20px 16px 40px" }}>
        {visited.size >= 1 && (
          <button onClick={() => setShowShareCard(true)} style={{
            display: "flex", alignItems: "center", gap: 8, padding: "14px 28px", borderRadius: 14, border: "none",
            background: C.accent, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer",
            boxShadow: `0 4px 20px rgba(91,140,90,0.25)`,
          }}>√¢¬ú¬® Share Your Journey</button>
        )}
        {visited.size >= 3 && (
          <button style={{
            padding: "14px 28px", borderRadius: 14, border: `2px solid ${C.accentWarm}`,
            background: "transparent", color: C.accentWarm, fontWeight: 700, fontSize: 14, cursor: "pointer",
          }}>Keep your map forever √¢¬Ä¬î Join Waitlist</button>
        )}
      </div>

      <style>{`
        @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        input:focus, textarea:focus { border-color: ${C.accent} !important; box-shadow: 0 0 0 3px rgba(91,140,90,0.1) !important; }
        * { -webkit-font-smoothing: antialiased; }
      `}</style>
    </div>
  );
}

const zoomBtnStyle = {
  width: 32, height: 32, borderRadius: 8, border: `1px solid ${C.border}`,
  background: `${C.card}ee`, color: C.text, fontSize: 16, fontWeight: 600,
  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
  backdropFilter: "blur(8px)", boxShadow: `0 2px 8px ${C.shadow}`,
};
const navBtnStyle = {
  padding: "8px 16px", borderRadius: 10, border: `1px solid ${C.border}`,
  background: C.card, color: C.textSoft, fontWeight: 600, fontSize: 12, cursor: "pointer",
};
// Render
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(InteractiveWorldMap));
  </script>
</body>
</html>
